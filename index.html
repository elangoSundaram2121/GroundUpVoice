<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GroundUp Voice Reporter</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #152033;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #53627c;
      line-height: 1.5;
    }

    .panel {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(21, 32, 51, 0.08);
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #recordBtn {
      background: #0a7cff;
      color: #ffffff;
    }

    #stopBtn {
      background: #e64d4d;
      color: #ffffff;
    }

    .status {
      margin: 0 0 18px;
      font-weight: 600;
    }

    .transcript-box {
      min-height: 160px;
      padding: 14px;
      border-radius: 12px;
      background: #f4f7fb;
      border: 1px solid #d8e0ec;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .container {
        padding: 18px 14px 32px;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>GroundUp Voice Reporter</h1>
    <p class="subtitle">Record a short voice message, upload it, and view the transcript.</p>

    <section class="panel">
      <div class="button-row">
        <button id="recordBtn" type="button">Record</button>
        <button id="stopBtn" type="button" disabled>Stop</button>
      </div>

      <p id="status" class="status">Status: Ready to record</p>

      <div id="transcript" class="transcript-box">Transcript will appear here after processing.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
