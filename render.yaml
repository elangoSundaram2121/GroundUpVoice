services:
  - type: web
    name: groundup-voice-reporter
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_DIR
        value: /var/data/groundup-voice
    disk:
      name: groundup-voice-data
      mountPath: /var/data
      sizeGB: 1
